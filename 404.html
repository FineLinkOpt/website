<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>找不到頁面 (404) | 佳聯光學科技</title>
    <link rel="icon" type="image/png" href="./assets/FineLinK_Logo_Rect1.png">
    <link rel="apple-touch-icon" href="./assets/FineLinK_Logo_Rect1.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./assets/styles.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: radial-gradient(circle at center, rgba(16, 32, 56, 0.8), var(--bg-color) 70%);
        }

        .error-container {
            text-align: center;
            max-width: 640px;
            animation: fadeUp 0.8s ease-out forwards;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 4px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .error-desc {
            font-size: 1.1rem;
            color: #b0c4de;
            margin-bottom: 40px;
            line-height: 1.8;
        }

        .home-btn {
            display: inline-block;
            padding: 14px 36px;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            border-radius: 30px;
            font-size: 1.05rem;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all var(--transition-speed);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        .home-btn:hover {
            background: var(--primary-color);
            color: var(--bg-color);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.6);
            transform: translateY(-2px);
        }

        .home-btn i {
            margin-right: 8px;
        }

        @media (max-width: 600px) {
            .error-code {
                font-size: 5.5rem;
            }

            .error-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <main class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">找不到您要的頁面</h1>
        <p class="error-desc">
            您嘗試造訪的網址可能已被移除、改名，或暫時無法存取。<br>
            請回到首頁繼續瀏覽佳聯光學科技的技術方案與產品資訊。
        </p>
        <a href="/" class="home-btn"><i class="fa-solid fa-arrow-left"></i> 返回首頁</a>
    </main>
</body>

</html>
