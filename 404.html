<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <script>
        (function() {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>找不到頁面 (404) | 佳聯光學科技</title>
    <link rel="icon" type="image/png" href="./assets/FineLinK_Logo_Rect1.png">
    <link rel="apple-touch-icon" href="./assets/FineLinK_Logo_Rect1.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./assets/styles.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background-color: var(--fl-canvas);
        }

        .error-container {
            text-align: center;
            max-width: 640px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 500;
            line-height: 1;
            letter-spacing: 4px;
            color: var(--fl-primary);
            margin-bottom: 20px;
            font-family: var(--fl-font-mono);
        }

        .error-title {
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--fl-text-primary);
        }

        .error-desc {
            font-size: 1.1rem;
            color: var(--fl-text-secondary);
            margin-bottom: 40px;
            line-height: 1.8;
        }

        .home-btn {
            display: inline-block;
            padding: 12px 32px;
            background-color: var(--fl-primary);
            color: var(--fl-on-primary);
            border: 1px solid var(--fl-primary);
            border-radius: var(--fl-radius-control);
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            transition: background-color var(--fl-dur) var(--fl-ease), border-color var(--fl-dur) var(--fl-ease);
        }

        .home-btn:hover {
            background-color: var(--fl-primary-hover);
            border-color: var(--fl-primary-hover);
        }

        .home-btn i {
            margin-right: 8px;
        }

        @media (max-width: 600px) {
            .error-code {
                font-size: 5.5rem;
            }

            .error-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <main class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">找不到您要的頁面</h1>
        <p class="error-desc">
            您嘗試造訪的網址可能已被移除、改名，或暫時無法存取。<br>
            請回到首頁繼續瀏覽佳聯光學科技的技術方案與產品資訊。
        </p>
        <a href="index.html" class="home-btn"><i class="fa-solid fa-arrow-left"></i> 返回首頁</a>
    </main>
</body>

</html>
